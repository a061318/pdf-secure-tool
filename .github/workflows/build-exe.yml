name: Build PDF Secure Tool EXE

on:
  workflow_dispatch:  # 手动触发
  push:
    branches: [ main ]

jobs:
  build-windows-exe:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyPDF2 reportlab pyinstaller pillow
        
    - name: Create icon
      run: |
        python -c "
        from PIL import Image, ImageDraw, ImageFont
        img = Image.new('RGBA', (256, 256), (255, 255, 255, 0))
        draw = ImageDraw.Draw(img)
        draw.rectangle([50, 50, 206, 206], fill=(220, 50, 50), outline=(180, 30, 30), width=3)
        draw.polygon([206, 50, 206, 100, 156, 50], fill=(200, 40, 40), outline=(180, 30, 30), width=3)
        img.save('icon.ico', format='ICO', sizes=[(256, 256), (128, 128), (64, 64), (48, 48), (32, 32), (16, 16)])
        print('图标创建完成')
        "
        
    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --onefile `
          --windowed `
          --name "PDF安全工具" `
          --icon "icon.ico" `
          --add-data "icon.ico;." `
          --hidden-import PyPDF2 `
          --hidden-import reportlab `
          --hidden-import reportlab.lib `
          --hidden-import reportlab.pdfgen `
          pdf_secure_gui.py
        
    - name: Upload EXE artifact
      uses: actions/upload-artifact@v4
      with:
        name: PDF安全工具
        path: dist/PDF安全工具.exe
        
    - name: Create release
      if: github.event_name == 'workflow_dispatch'
      uses: softprops/action-gh-release@v1
      with:
        files: dist/PDF安全工具.exe
        tag_name: v1.0
        name: PDF安全工具 v1.0
        body: |
          PDF安全工具 - Windows 11免安装版
          
          功能特点：
          - ✅ 免安装EXE，直接运行
          - ✅ 图形界面，中文操作
          - ✅ 添加文字水印
          - ✅ PDF文件加密
          - ✅ 批量处理功能
          
          使用方法：
          1. 下载 PDF安全工具.exe
          2. 双击运行即可
          3. 无需安装Python或其他依赖