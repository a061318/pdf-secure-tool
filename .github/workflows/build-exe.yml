name: Build PDF Secure Tool EXE

on:
  workflow_dispatch:  # 手动触发
  push:
    branches: [ main ]

jobs:
  build-windows-exe:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyPDF2 reportlab pyinstaller pillow
        
    - name: Create icon
      run: |
        python create_icon.py
        
    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --onefile `
          --windowed `
          --name "PDF安全工具" `
          --icon "icon.ico" `
          --add-data "icon.ico;." `
          --hidden-import PyPDF2 `
          --hidden-import reportlab `
          --hidden-import reportlab.lib `
          --hidden-import reportlab.pdfgen `
          pdf_secure_gui.py
        
    - name: Upload EXE artifact
      uses: actions/upload-artifact@v3
      with:
        name: PDF安全工具
        path: dist/PDF安全工具.exe
        
    - name: Create release
      if: github.event_name == 'workflow_dispatch'
      uses: softprops/action-gh-release@v1
      with:
        files: dist/PDF安全工具.exe
        tag_name: v1.0
        name: PDF安全工具 v1.0
        body: |
          PDF安全工具 - Windows 11免安装版
          
          功能特点：
          - ✅ 免安装EXE，直接运行
          - ✅ 图形界面，中文操作
          - ✅ 添加文字水印
          - ✅ PDF文件加密
          - ✅ 批量处理功能
          
          使用方法：
          1. 下载 PDF安全工具.exe
          2. 双击运行即可
          3. 无需安装Python或其他依赖