name: Build EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyPDF2 reportlab pyinstaller
        
    - name: Build EXE
      run: |
        pyinstaller --onefile --windowed --name "PDF安全工具" pdf_secure_gui.py
        
    - name: Upload EXE
      uses: actions/upload-artifact@v3
      with:
        name: PDF安全工具
        path: dist/PDF安全工具.exe
