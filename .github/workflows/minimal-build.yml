name: Build EXE File

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install packages
      run: |
        pip install PyPDF2 reportlab pyinstaller
    
    - name: Build EXE
      run: |
        pyinstaller --onefile --windowed --name "PDF安全工具" pdf_secure_gui.py
    
    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: PDF-Tool
        path: dist/PDF安全工具.exe